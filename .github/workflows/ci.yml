name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Unit tests
        run: ./gradlew test --no-daemon

      - name: Modulith verification
        run: ./gradlew :modulith-verification:test --no-daemon

      - name: Integration tests
        run: ./gradlew :app:integrationTest --no-daemon

      - name: Docker build
        run: docker build -t reconcile-saas:ci .

      - name: Docker compose up
        run: |
          cp .env.example .env
          sed -i 's/change_me/ci_password/g' .env
          docker compose up -d postgres redis otel-collector
          sleep 15
          docker compose run --rm -e SPRING_PROFILES_ACTIVE=container \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/reconcile \
            -e SPRING_DATASOURCE_USERNAME=reconcile \
            -e SPRING_DATASOURCE_PASSWORD=ci_password \
            -e SPRING_REDIS_HOST=redis \
            -e SPRING_REDIS_PORT=6379 \
            -e SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost \
            app java org.springframework.boot.loader.launch.JarLauncher &
          sleep 30
          curl --fail --retry 10 --retry-delay 3 http://localhost:8080/actuator/health || true

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"
