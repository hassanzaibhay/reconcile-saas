spring:
  application:
    name: reconcile-saas
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        multiTenancy: SCHEMA
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    enabled: false
  batch:
    job:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    com.reconcile: INFO
